spring:
  application:
    name: pet-adoption-chat
  jpa:
    open-in-view: false
  threads:
    virtual:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:petdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ollama:
  base-url: http://localhost:11434
  model: gemma3:4b
  timeout: 60

jwt:
  secret: dev-secret-key-change-in-production-min32chars!!
  expiration: 86400000

logging:
  level:
    com.petadoption: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

ollama:
  base-url: ${OLLAMA_URL:http://ollama:11434}
  model: ${OLLAMA_MODEL:llama3}
  timeout: 90

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.petadoption: INFO
